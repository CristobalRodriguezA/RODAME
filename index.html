<title>RODAME Distribuidora</title>

<meta name="mobile-web-app-capable" content="yes">

<style>
/* ============================================================
   RODAME DISTRIBUIDORA — Sistema de diseño "Fresco y marino"
   ============================================================ */
:root{
  /* Color */
  --bg:        #eaf1f4;
  --bg-grad-1: #e9f2f5;
  --bg-grad-2: #dfeaef;
  --surface:   #ffffff;
  --surface-2: #f4f8fa;
  --ink:       #0c1c25;
  --ink-soft:  #2c4350;
  --muted:     #5d7884;
  --muted-2:   #88a0ab;
  --line:      #dce7ec;
  --line-soft: #e8eff2;

  --ocean:      #0a7ea4;
  --ocean-deep: #0a6184;
  --ocean-700:  #0d4f6b;
  --ocean-tint: #e2f0f5;
  --ocean-tint2:#d2e8ef;

  --foam:   #1aa9b0;
  --green:  #16936a;
  --green-tint:#e0f3ec;
  --coral:  #e2603f;
  --coral-tint:#fae6df;
  --amber:  #d9941f;
  --amber-tint:#fbf0d9;
  --red:    #d33f3f;

  --shadow-sm: 0 1px 2px rgba(12,28,37,.06), 0 1px 3px rgba(12,28,37,.05);
  --shadow-md: 0 4px 14px rgba(12,28,37,.08), 0 2px 6px rgba(12,28,37,.05);
  --shadow-lg: 0 14px 40px rgba(12,28,37,.16), 0 4px 12px rgba(12,28,37,.08);
  --shadow-up: 0 -6px 24px rgba(12,28,37,.10);

  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 26px;

  --font-display:'Outfit', system-ui, sans-serif;
  --font-body:'Plus Jakarta Sans', system-ui, sans-serif;

  --maxw: 480px;
  --nav-h: 68px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overscroll-behavior-y:none;
}
button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
iconify-icon{ display:inline-flex; align-items:center; justify-content:center; vertical-align:-0.135em; }
input,select,textarea{ font-family:inherit; font-size:16px; color:var(--ink); }
h1,h2,h3,h4{ font-family:var(--font-display); margin:0; letter-spacing:-.01em; }
a{ color:inherit; }
::selection{ background:var(--ocean-tint); }

/* ---- App frame: phone-sized, centered on desktop ---- */
#root{ min-height:100dvh; }
.app{
  max-width:var(--maxw);
  margin:0 auto;
  min-height:100dvh;
  background:linear-gradient(180deg,var(--bg-grad-1),var(--bg-grad-2));
  position:relative;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 0 1px rgba(12,28,37,.04);
}
@media(min-width:520px){
  body{ background:#cdd9df; padding:0; }
  .app{ min-height:100dvh; box-shadow:var(--shadow-lg); }
}

/* ---- Screen scroll area ---- */
.screen{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 22px);
}
.screen-pad{ padding:0 16px; }

/* ---- Top bar ---- */
.topbar{
  position:sticky; top:0; z-index:20;
  background:linear-gradient(180deg, rgba(234,241,244,.96), rgba(234,241,244,.82));
  backdrop-filter:blur(12px);
  padding:14px 16px 12px;
  display:flex; align-items:center; gap:12px;
}
.topbar h1{ font-size:21px; font-weight:700; line-height:1.05; }
.topbar .sub{ font-size:12.5px; color:var(--muted); font-weight:500; margin-top:1px; }
.topbar-spacer{ flex:1; }

.brandmark{
  width:38px; height:38px; border-radius:11px; flex:none;
  background:linear-gradient(150deg,var(--ocean),var(--ocean-700));
  color:#fff; display:grid; place-items:center;
  font-family:var(--font-display); font-weight:700; font-size:18px;
  box-shadow:0 4px 12px rgba(10,126,164,.35);
}

/* ---- Bottom navigation ---- */
.bottomnav{
  position:fixed; left:50%; transform:translateX(-50%);
  bottom:0; width:100%; max-width:var(--maxw); z-index:40;
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  box-shadow:var(--shadow-up);
  display:grid; grid-template-columns:repeat(5,1fr);
}
.navbtn{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; color:var(--muted-2); font-size:10.5px; font-weight:600;
  position:relative; transition:color .15s;
}
.navbtn i, .navbtn iconify-icon{ font-size:23px; }
.navbtn.active{ color:var(--ocean); }
.navbtn.active::before{
  content:''; position:absolute; top:0; width:26px; height:3px; border-radius:3px;
  background:var(--ocean);
}

/* ---- Cards ---- */
.card{
  background:var(--surface); border-radius:var(--r-lg);
  box-shadow:var(--shadow-sm); border:1px solid var(--line-soft);
}
.card-pad{ padding:16px; }

/* ---- Buttons ---- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border-radius:var(--r-md); font-weight:700; font-size:15px;
  padding:13px 18px; transition:transform .08s, background .15s, box-shadow .15s;
  font-family:var(--font-body);
}
.btn:active{ transform:scale(.97); }
.btn-primary{ background:var(--ocean); color:#fff; box-shadow:0 6px 16px rgba(10,126,164,.30); }
.btn-primary:active{ background:var(--ocean-deep); }
.btn-ghost{ background:var(--surface-2); color:var(--ink-soft); }
.btn-line{ background:var(--surface); border:1.5px solid var(--line); color:var(--ink-soft); }
.btn-green{ background:var(--green); color:#fff; box-shadow:0 6px 16px rgba(22,147,106,.28); }
.btn-danger{ background:var(--coral-tint); color:var(--coral); }
.btn-block{ width:100%; }
.btn-sm{ padding:9px 13px; font-size:13.5px; border-radius:11px; }
.btn-lg{ padding:15px 20px; font-size:16px; }
.btn:disabled{ opacity:.45; pointer-events:none; }

.iconbtn{
  width:40px; height:40px; border-radius:12px; display:grid; place-items:center;
  background:var(--surface-2); color:var(--ink-soft); font-size:20px; flex:none;
}
.iconbtn:active{ transform:scale(.93); }

/* ---- FAB ---- */
.fab{
  position:fixed; z-index:42; right:50%; margin-right:calc(-1*var(--maxw)/2 + 18px);
  bottom:calc(var(--nav-h) + var(--safe-b) + 16px);
  background:var(--ocean); color:#fff; height:56px; padding:0 22px;
  border-radius:18px; display:inline-flex; align-items:center; gap:9px;
  font-weight:700; font-size:15.5px; box-shadow:0 10px 26px rgba(10,126,164,.42);
}
.fab i, .fab iconify-icon{ font-size:22px; }
.fab:active{ transform:scale(.95); }
@media(max-width:520px){ .fab{ right:18px; margin-right:0; } }

/* ---- Chips / badges ---- */
.chip{
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 11px; border-radius:999px; font-size:12.5px; font-weight:700;
  background:var(--surface-2); color:var(--muted);
}
.chip.active{ background:var(--ocean); color:#fff; }
.badge{
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 9px; border-radius:999px; font-size:11.5px; font-weight:700;
}
.badge-green{ background:var(--green-tint); color:var(--green); }
.badge-coral{ background:var(--coral-tint); color:var(--coral); }
.badge-amber{ background:var(--amber-tint); color:#b5790f; }
.badge-ocean{ background:var(--ocean-tint); color:var(--ocean-deep); }
.badge-gray{ background:var(--surface-2); color:var(--muted); }
.dot{ width:7px; height:7px; border-radius:50%; flex:none; }

/* ---- Pill toggle group ---- */
.segment{
  display:flex; background:var(--surface-2); border-radius:13px; padding:4px; gap:3px;
}
.segment button{
  flex:1; padding:9px 6px; border-radius:10px; font-size:13.5px; font-weight:700;
  color:var(--muted); transition:.15s;
}
.segment button.on{ background:var(--surface); color:var(--ocean); box-shadow:var(--shadow-sm); }

/* ---- Inputs ---- */
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12.5px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; }
.input, .select, .textarea{
  width:100%; background:var(--surface-2); border:1.5px solid transparent;
  border-radius:var(--r-md); padding:13px 14px; font-size:15.5px; color:var(--ink);
  transition:border .15s, background .15s; outline:none;
}
.input:focus, .select:focus, .textarea:focus{ border-color:var(--ocean); background:#fff; }
.textarea{ resize:vertical; min-height:80px; line-height:1.45; }
.input::placeholder, .textarea::placeholder{ color:var(--muted-2); }
.input-prefix{ position:relative; }
.input-prefix .pfx{ position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-weight:700; }
.input-prefix .input{ padding-left:30px; }

/* ---- Search ---- */
.search{ position:relative; }
.search i, .search iconify-icon{ position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted-2); font-size:19px; z-index:1; }
.search input{
  width:100%; background:var(--surface); border:1px solid var(--line);
  border-radius:13px; padding:12px 14px 12px 40px; font-size:15px; outline:none;
}
.search input:focus{ border-color:var(--ocean); }

/* ---- List rows ---- */
.row{ display:flex; align-items:center; gap:13px; }
.thumb{
  width:54px; height:54px; border-radius:14px; flex:none; object-fit:cover;
  background:var(--ocean-tint); display:grid; place-items:center; color:var(--ocean);
  font-size:24px; overflow:hidden;
}
.thumb.lg{ width:64px; height:64px; border-radius:16px; }
.avatar{
  width:46px; height:46px; border-radius:50%; flex:none; display:grid; place-items:center;
  font-family:var(--font-display); font-weight:700; font-size:17px; color:#fff;
}

/* ---- Stat tiles ---- */
.stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.stat{
  background:var(--surface); border-radius:var(--r-lg); padding:15px 16px;
  box-shadow:var(--shadow-sm); border:1px solid var(--line-soft);
}
.stat .lab{ font-size:12px; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:6px; }
.stat .val{ font-family:var(--font-display); font-weight:700; font-size:25px; margin-top:7px; line-height:1; letter-spacing:-.02em; }
.stat .delta{ font-size:11.5px; font-weight:700; margin-top:6px; }

/* ---- Section heading ---- */
.sec-head{ display:flex; align-items:center; justify-content:space-between; margin:22px 2px 11px; }
.sec-head h2{ font-size:16.5px; font-weight:700; }
.sec-head .link{ font-size:13px; font-weight:700; color:var(--ocean); }

/* ---- Sheet / Modal ---- */
.scrim{
  position:fixed; inset:0; z-index:60; background:rgba(10,28,37,.46);
  backdrop-filter:blur(2px); display:flex; align-items:flex-end; justify-content:center;
  animation:fade .2s ease;
}
@media(min-width:520px){ .scrim{ align-items:center; } }
.sheet{
  width:100%; max-width:var(--maxw); background:var(--surface);
  border-radius:24px 24px 0 0; max-height:92dvh; overflow-y:auto;
  animation:slideup .26s cubic-bezier(.22,1,.36,1);
  padding-bottom:calc(20px + var(--safe-b));
}
@media(min-width:520px){ .sheet{ border-radius:24px; max-height:88dvh; margin:0 16px; } }
.sheet-grab{ width:42px; height:5px; border-radius:5px; background:var(--line); margin:10px auto 4px; }
.sheet-head{
  position:sticky; top:0; background:var(--surface); z-index:2;
  display:flex; align-items:center; gap:12px; padding:8px 18px 14px;
  border-bottom:1px solid var(--line-soft);
}
.sheet-head h3{ font-size:18px; font-weight:700; flex:1; }
.sheet-body{ padding:18px; }
@keyframes slideup{ from{ transform:translateY(100%); } to{ transform:translateY(0); } }
@keyframes fade{ from{ opacity:0; } to{ opacity:1; } }

/* ---- Toast ---- */
.toast-wrap{ position:fixed; bottom:calc(var(--nav-h) + var(--safe-b) + 80px); left:0; right:0; z-index:80; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; }
.toast{
  background:var(--ink); color:#fff; padding:11px 18px; border-radius:13px;
  font-size:14px; font-weight:600; box-shadow:var(--shadow-lg);
  display:flex; align-items:center; gap:9px; animation:toastin .25s ease;
  max-width:90%;
}
.toast i, .toast iconify-icon{ font-size:18px; }
.toast.ok i, .toast.ok iconify-icon{ color:#5fe0a0; }
@keyframes toastin{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }

/* ---- Empty state ---- */
.empty{ text-align:center; padding:42px 24px; color:var(--muted); }
.empty .ic{ width:68px; height:68px; border-radius:20px; background:var(--ocean-tint); color:var(--ocean); display:grid; place-items:center; font-size:32px; margin:0 auto 14px; }
.empty h3{ font-size:16.5px; color:var(--ink); margin-bottom:5px; }
.empty p{ font-size:13.5px; line-height:1.5; max-width:260px; margin:0 auto 16px; }

/* ---- Divider ---- */
.hr{ height:1px; background:var(--line-soft); border:none; margin:14px 0; }

/* ---- Misc utilities ---- */
.muted{ color:var(--muted); }
.tnum{ font-variant-numeric:tabular-nums; }
.mono{ font-family:'Outfit',monospace; font-variant-numeric:tabular-nums; }
.flex{ display:flex; } .between{ justify-content:space-between; } .center{ align-items:center; }
.gap6{ gap:6px; } .gap8{ gap:8px; } .gap10{ gap:10px; } .gap12{ gap:12px; }
.col{ display:flex; flex-direction:column; }
.grow{ flex:1; }
.wrap{ flex-wrap:wrap; }
.ellipsis{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fw700{ font-weight:700; } .fw600{ font-weight:600; }
.f12{ font-size:12px; } .f13{ font-size:13px; } .f14{ font-size:14px; } .f15{ font-size:15px; }
.mt4{ margin-top:4px; } .mt8{ margin-top:8px; } .mt12{ margin-top:12px; } .mt16{ margin-top:16px; }
.scale-in{ animation:scalein .2s ease; }
@keyframes scalein{ from{ opacity:0; transform:scale(.96); } to{ opacity:1; transform:scale(1); } }

/* striped placeholder for product photo */
.ph-stripe{
  background:repeating-linear-gradient(45deg,var(--ocean-tint),var(--ocean-tint) 9px,var(--ocean-tint2) 9px,var(--ocean-tint2) 18px);
}

@keyframes spin{ to{ transform:rotate(360deg); } }

/* hidden export canvas host */
.export-host{ position:fixed; left:-9999px; top:0; width:720px; background:#fff; }

/* ============================================================
   Card grids + dashboard columns (transparentes en móvil)
   ============================================================ */
.cards{ display:flex; flex-direction:column; gap:10px; }
.dash-grid{ display:contents; }
.dash-col{ display:contents; }

/* Layout móvil base: barra lateral oculta, columna principal normal */
.sidebar{ display:none; }
.main-col{ display:flex; flex-direction:column; flex:1; min-width:0; }

/* ============================================================
   VISTA WEB / ESCRITORIO (≥ 980px)
   ============================================================ */
@media(min-width:980px){
  body{ background:#cfdae0; }
  .app{
    max-width:1240px; flex-direction:row; align-items:stretch;
    min-height:100dvh; box-shadow:var(--shadow-lg); overflow:hidden;
  }
  .main-col{ min-height:100dvh; }

  /* Barra lateral */
  .sidebar{
    display:flex; flex-direction:column; width:256px; flex:none;
    background:#fff; border-right:1px solid var(--line);
    padding:22px 16px 18px; gap:4px; height:100dvh; position:sticky; top:0;
  }
  .sidebar .brandrow{ display:flex; align-items:center; gap:12px; padding:4px 8px 20px; }
  .sidebar .brandrow .nm{ font-family:var(--font-display); font-weight:800; font-size:17px; line-height:1.05; }
  .sidebar .brandrow .tg{ font-size:11.5px; color:var(--muted); font-weight:600; }
  .snav{
    display:flex; align-items:center; gap:13px; padding:12px 14px; border-radius:13px;
    font-weight:700; color:var(--ink-soft); font-size:15px; text-align:left; width:100%;
    transition:background .14s, color .14s;
  }
  .snav iconify-icon{ font-size:22px; color:var(--muted-2); }
  .snav:hover{ background:var(--surface-2); }
  .snav.active{ background:var(--ocean-tint); color:var(--ocean-deep); }
  .snav.active iconify-icon{ color:var(--ocean); }
  .sidebar .sidefoot{ margin-top:auto; padding:10px 8px 2px; border-top:1px solid var(--line-soft); }

  /* Oculta cromo móvil */
  .bottomnav{ display:none; }

  /* Contenido ancho y centrado */
  .screen{ padding-bottom:48px; }
  .screen-pad{ max-width:1020px; margin:0 auto; width:100%; padding:0 30px; }
  .topbar{ padding:22px 30px 16px; background:linear-gradient(180deg, rgba(234,241,244,.97), rgba(234,241,244,.85)); }
  .topbar h1{ font-size:24px; }
  .topbar .brandmark{ display:none; }

  /* Grillas de tarjetas en pantallas anchas */
  .cards{ display:grid; grid-template-columns:repeat(auto-fill, minmax(330px, 1fr)); gap:12px; align-items:start; }

  /* Dashboard a dos columnas */
  .dash-grid{ display:grid; grid-template-columns:1fr 1fr; gap:4px 24px; align-items:start; }
  .dash-col{ display:flex; flex-direction:column; }

  /* FAB en esquina del área de contenido */
  .fab{ right:36px; margin-right:0; bottom:32px; }

  /* Sheets centrados, un poco más anchos */
  .scrim{ align-items:center; }
  .sheet{ max-width:560px; border-radius:24px; }
}

@media(min-width:1280px){
  .screen-pad{ max-width:1080px; }
}

</style>

<!-- Aplicación (JSX precompilado a JS — carga instantánea, sin Babel) -->
<script>
/* ===== data.jsx ===== */
/* ============================================================
   data.jsx — Almacenamiento, formato y datos de ejemplo
   Todo persiste en localStorage del teléfono.
   ============================================================ */
const LS_KEY = 'rodame_v1';

/* ---------- Utilidades ---------- */
const uid = (p = 'id') => p + '_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);

/* Formato peso chileno: $16.500 (sin decimales, punto de miles) */
function clp(n) {
  const v = Math.round(Number(n) || 0);
  return '$' + v.toLocaleString('es-CL');
}
/* Versión compacta para tiles: $1,2M / $850K */
function clpShort(n) {
  n = Number(n) || 0;
  if (Math.abs(n) >= 1000000) return '$' + (n / 1000000).toLocaleString('es-CL', {
    maximumFractionDigits: 1
  }) + 'M';
  if (Math.abs(n) >= 1000) return '$' + Math.round(n / 1000) + 'K';
  return clp(n);
}
function parseNum(s) {
  if (typeof s === 'number') return s;
  if (!s) return 0;
  return Number(String(s).replace(/[^\d]/g, '')) || 0;
}
/* Parsea decimales aceptando coma o punto (formato chileno y teclado móvil) */
function parseDec(s) {
  if (typeof s === 'number') return s;
  if (s == null) return 0;
  let t = String(s).trim().replace(/[^0-9.,]/g, '');
  if (t === '') return 0;
  const hasC = t.includes(','),
    hasD = t.includes('.');
  if (hasC && hasD) t = t.replace(/\./g, '').replace(',', '.');else if (hasC) t = t.replace(',', '.');
  const n = parseFloat(t);
  return isNaN(n) ? 0 : n;
}
/* Formatea kilos: 3,25 kg */
function fmtKg(n) {
  return Number(n || 0).toLocaleString('es-CL', {
    maximumFractionDigits: 3
  });
}
const DAY = 86400000;
function daysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return Math.floor((Date.now() - d.getTime()) / DAY);
}
function relDays(dateStr) {
  const d = daysSince(dateStr);
  if (d === null) return 'Sin compras';
  if (d <= 0) return 'Hoy';
  if (d === 1) return 'Ayer';
  if (d < 7) return `hace ${d} días`;
  if (d < 30) return `hace ${Math.floor(d / 7)} sem`;
  if (d < 365) return `hace ${Math.floor(d / 30)} mes${Math.floor(d / 30) > 1 ? 'es' : ''}`;
  return `hace ${Math.floor(d / 365)} año(s)`;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('es-CL', {
    day: '2-digit',
    month: 'short',
    year: 'numeric'
  });
}
function fmtDateShort(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('es-CL', {
    day: '2-digit',
    month: 'short'
  });
}
function monthKey(dateStr) {
  const d = new Date(dateStr);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}
function isSameMonth(dateStr, ref = new Date()) {
  const d = new Date(dateStr);
  return d.getFullYear() === ref.getFullYear() && d.getMonth() === ref.getMonth();
}
/* Normaliza teléfono chileno a formato wa.me (56 + 9 dígitos) */
function waNumber(phone) {
  let p = String(phone || '').replace(/[^\d]/g, '');
  if (!p) return '';
  if (p.startsWith('56')) return p;
  if (p.length === 9 && p.startsWith('9')) return '56' + p;
  if (p.length === 8) return '569' + p;
  return p.startsWith('56') ? p : '56' + p;
}
function avatarColor(name) {
  const colors = ['#0a7ea4', '#1aa9b0', '#16936a', '#3a6ea5', '#5a7d9a', '#0a6184', '#2e8b8b'];
  let h = 0;
  for (const c of name || '') h = h * 31 + c.charCodeAt(0) >>> 0;
  return colors[h % colors.length];
}
const initials = name => (name || '?').trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();

/* ---------- Store global (pub/sub) ---------- */
const Store = function () {
  let state;
  try {
    const raw = localStorage.getItem(LS_KEY);
    state = raw ? JSON.parse(raw) : seedData();
  } catch (e) {
    state = seedData();
  }
  const listeners = new Set();
  function persist() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    } catch (e) {
      console.warn('No se pudo guardar', e);
    }
  }
  function emit() {
    persist();
    listeners.forEach(l => l(state));
  }
  return {
    get: () => state,
    set: updater => {
      state = typeof updater === 'function' ? updater(state) : {
        ...state,
        ...updater
      };
      state._updatedAt = Date.now(); // marca de cambio (para sincronizar)
      emit();
    },
    /* Reemplaza el estado completo desde la nube SIN re-marcar la fecha
       (conserva la marca remota para comparar versiones). */
    replace: data => {
      state = data;
      persist();
      listeners.forEach(l => l(state));
    },
    subscribe: fn => {
      listeners.add(fn);
      return () => listeners.delete(fn);
    },
    reset: () => {
      state = seedData();
      state._updatedAt = Date.now();
      emit();
    },
    wipe: () => {
      state = {
        ...seedData(),
        products: [],
        clients: [],
        sales: [],
        expenses: [],
        otherIncome: []
      };
      state._updatedAt = Date.now();
      emit();
    }
  };
}();

/* Hook React para leer/escribir el store */
function useStore() {
  const [, force] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => Store.subscribe(force), []);
  const s = Store.get();
  return [s, Store.set];
}

  /* Importar catálogo desde Excel (crear / actualizar / eliminar).
     IMPORTANTE: solo cambia el costo ACTUAL del producto. Las ventas ya
     registradas guardan su propio costo, así que el historial no se altera. */
  applyCatalogImport({
    create = [],
    update = [],
    removeIds = []
  }) {
    Store.set(s => {
      let products = [...s.products];
      // Actualizaciones
      update.forEach(u => {
        const i = products.findIndex(p => p.id === u.id);
        if (i >= 0) {
          const prev = products[i];
          let merged = {
            ...prev,
            ...u.changes
          };
          // historial de costos (si cambió el costo)
          if (u.changes.costo != null && u.changes.costo !== (prev.costo || 0)) {
            const hist = [...(prev.costoHist || [])];
            hist.push({
              fecha: u.changes.costoActualizado || new Date().toISOString(),
              costo: u.changes.costo
            });
            merged.costoHist = hist.slice(-12);
          }
          products[i] = merged;
        }
      });
      // Eliminaciones
      if (removeIds.length) {
        const rm = new Set(removeIds);
        products = products.filter(p => !rm.has(p.id));
      }
      // Nuevos (al inicio)

        id: uid('p'),

/* ---------- Selectores derivados ---------- */
const Select = {
  clientSales(state, clientId) {
    return state.sales.filter(v => v.clienteId === clientId).sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
  },
  lastSaleDate(state, clientId) {
    const vs = Select.clientSales(state, clientId);
    return vs.length ? vs[0].fecha : null;
  },
  clientTotal(state, clientId) {
    return state.sales.filter(v => v.clienteId === clientId).reduce((s, v) => s + v.total, 0);
  },
  needsFollowup(state, clientId) {
    const last = Select.lastSaleDate(state, clientId);
    const d = daysSince(last);
    return d === null || d >= (state.settings.seguimientoDias || 14);
  },
  monthSales(state, ref = new Date()) {
    return state.sales.filter(v => isSameMonth(v.fecha, ref));
  },
  monthExpenses(state, ref = new Date()) {
    return state.expenses.filter(g => isSameMonth(g.fecha, ref));
  },
  monthIncomeExtra(state, ref = new Date()) {
    return (state.otherIncome || []).filter(g => isSameMonth(g.fecha, ref));
  },
  /* Productos más vendidos (por monto) en los últimos 30 días */
  topProducts(state, n = 3) {
    const cut = Date.now() - 30 * DAY;
    const map = {};
    state.sales.forEach(v => {
      if (new Date(v.fecha).getTime() < cut) return;
      v.items.forEach(it => {
        if (!map[it.productoId]) map[it.productoId] = {
          nombre: it.nombre,
          monto: 0,
          cant: 0
        };
        map[it.productoId].monto += it.precio * it.cantidad;
        map[it.productoId].cant += it.cantidad;
      });
    });
    return Object.values(map).sort((a, b) => b.monto - a.monto).slice(0, n);
  },
  /* ---- Margen (costo vs venta), usando el costo guardado en cada venta ---- */
  saleCost(sale) {
    return (sale.items || []).reduce((a, it) => a + (it.costo || 0) * it.cantidad, 0);
  },
  saleMargin(sale) {
    return sale.total - Select.saleCost(sale);
  },
  marginOf(sales) {
    return sales.reduce((a, v) => a + Select.saleMargin(v), 0);
  },
  /* ¿alguna venta del periodo trae costos cargados? (para mostrar margen o no) */
  hasCosts(sales) {
    return sales.some(v => (v.items || []).some(it => (it.costo || 0) > 0));
  },
  /* ---- Cuentas por cobrar (con abonos parciales) ---- */
  saleAbonado(v) {
    return (v.abonos || []).reduce((a, x) => a + (x.monto || 0), 0);
  },
  saleSaldo(v) {
    if (v.pagado === true) return 0;
    return Math.max(0, v.total - Select.saleAbonado(v));
  },
  unpaidSales(sales) {
    return sales.filter(v => Select.saleSaldo(v) > 0);
  },
  porCobrar(sales) {
    return sales.reduce((a, v) => a + Select.saleSaldo(v), 0);
  }
};

/* ============================================================
   sync.jsx — Sincronización opcional en la nube (Supabase)
   La app funciona 100% sin esto. Si configuras URL + clave +
   código de espacio, tus datos se comparten entre dispositivos.
   Modelo simple: un documento JSON por "espacio de trabajo".
   ============================================================ */
const SYNC_CFG_KEY = 'rodame_sync_cfg';
const Sync = function () {
  let cfg = {
    enabled: false,
    url: '',
    key: '',
    workspace: ''
  };
  try {
    const raw = localStorage.getItem(SYNC_CFG_KEY);
    if (raw) cfg = {
      ...cfg,
      ...JSON.parse(raw)
    };
  } catch (e) {}
  let status = {
    state: 'off',
    msg: 'Sin sincronizar',
    lastSync: null
  };
  const listeners = new Set();
  let applying = false; // evita re-empujar al recibir datos remotos
  let pushTimer = null;
  function setStatus(state, msg) {
    status = {
      ...status,
      state,
      msg,
      lastSync: state === 'ok' ? Date.now() : status.lastSync
    };
    listeners.forEach(l => l(status));
  }
  function on(fn) {
    listeners.add(fn);
    fn(status);
    return () => listeners.delete(fn);
  }
  function saveCfg() {
    try {
      localStorage.setItem(SYNC_CFG_KEY, JSON.stringify(cfg));
    } catch (e) {}
  }
  function getCfg() {
    return {
      ...cfg
    };
  }
  function valid(c) {
    return !!(c.url && c.key && c.workspace);
  }
  function base() {
    return cfg.url.replace(/\/+$/, '') + '/rest/v1/rodame_data';
  }
  function headers(extra) {
    return Object.assign({
      'apikey': cfg.key,
      'Authorization': 'Bearer ' + cfg.key,
      'Content-Type': 'application/json'
    }, extra || {});
  }
  async function pull() {
    const url = base() + '?workspace=eq.' + encodeURIComponent(cfg.workspace) + '&select=data,updated_at';
    const res = await fetch(url, {
      headers: headers()
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    return rows && rows[0] ? rows[0] : null; // {data, updated_at} | null
